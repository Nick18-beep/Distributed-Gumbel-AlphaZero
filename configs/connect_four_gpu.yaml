run:
  name: connect-four-gpu
  seed: 42
  output_dir: artifacts/runs

execution:
  backend: single_process

cluster:
  enabled: false
  head_address: null

install:
  profile: cuda

storage:
  backend: filesystem
  root: artifacts/runs

logging:
  level: INFO
  format: jsonl

game:
  name: connect_four
  implementation: torch

algorithm:
  name: gumbel_alphazero

search:
  backend: torch_gumbel
  simulations_per_move: 256
  max_num_considered_actions: 7
  gumbel_scale: 1.0
  q_transform: completed_by_mix_value

model:
  name: resnet_board
  channels: 128
  blocks: 6

selfplay:
  games_per_iteration: 512
  batch_size: 512
  temperature_moves: 12
  shard_max_samples: 8192

replay:
  window_samples: 500000
  min_samples_to_train: 8192
  low_watermark: 16384
  high_watermark: 250000

training:
  batch_size: 512
  steps_per_iteration: 200
  total_steps: 200000
  optimizer: adamw
  learning_rate: 0.001
  weight_decay: 0.0001
  checkpoint_every_steps: 1000

eval:
  enabled: true
  games: 200
  promotion_win_rate: 0.55

stop:
  max_iterations: 200
  max_train_steps: 200000
  max_games: 102400
  max_wall_time_sec: null
